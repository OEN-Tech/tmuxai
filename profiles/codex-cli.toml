[meta]
name = "codex-cli"
cli_command = "codex"
banner = 'OpenAI Codex \(v[\d.]+\)'
version_capture = 'v([\d.]+)'
# 0.137: --full-auto was removed; YOLO = --dangerously-bypass-approvals-and-sandbox.
# service_tier="fast" = the "xhigh fast" mode shown in codex's status bar (pinned
# here so it doesn't depend on the global ~/.codex/config.toml default).
# NOTE: codex shows a one-time directory-trust gate the daemon can't dismiss —
# the worker cwd (or its git root) must already be codex-trusted (~/.codex/config.toml).
# Launch via the codex-fleet wrapper (see bin/codex-fleet), which pre-trusts the
# canonical cwd so the interactive "trust this directory?" gate (undismissable by
# the daemon) never blocks a worker, then exec's the real `codex`. Put bin/ on your
# PATH (or symlink codex-fleet into a PATH dir) so this resolves on any machine.
launch_command = "codex-fleet --dangerously-bypass-approvals-and-sandbox -m gpt-5.5 -c model_reasoning_effort=\"xhigh\" -c service_tier=\"fast\""

[prompt]
# 0.137 idle prompt carries a rotating placeholder hint ("› Summarize recent
# commits"), so match `›` optionally followed by text — else `ready` never fires.
pattern = '^›(\s.*)?$'
input = '^› (.+)'

[separator]
pattern = '^─{20,}'

[markers]
assistant_prefix = "•"
tool_use = '^• (Ran|Explored|Read|Wrote|Edited) (.+)'
tool_result = '^\s+[└├─] (.+)'
truncated = '^\s+… \+(\d+) lines'
thinking = '^◦ Working\s*\((.+?)\)'
skill_load = ''

[tasks]
done = "✓"
# active MUST stay empty: codex uses `•` as its assistant-text bullet, so a `•`
# task-active marker (matched by `contains`, before assistant_prefix) would
# mis-classify every answer as a TaskItem. Codex does not render `•` checklists.
active = ""
pending = "◦"

[status_bar]
# 0.137: "gpt-5.5 xhigh fast · Context 95% left · … · 258K window · 20.6K used".
# Capture the model token (group 1); context % is best-effort and may be absent.
pattern = '^\s*gpt-([\d.]+ \w+ \w+) · Context (\d+)% left'
peak_indicator = ''
memory = ''

[question]
choice_pattern = '^\s*([A-Z])\)\s+(.+)'

[error]
patterns = [
    '^Error:',
    '^✗',
    'ENOENT|EPERM|EACCES',
]

[chrome]
# Startup/banner noise that must never become assistant-text continuation:
# MCP warnings, tips, the update-available box, and box-drawing frames.
patterns = [
    '^⚠ ',
    '^\s*Tip: ',
    'Update available',
    '^\s*[╭╰│]',
]

[exec]
# Routed through codex-fleet so the canonical cwd is pre-trusted (no trust gate).
# --skip-git-repo-check: codex exec refuses outside a git repo (separate from the
# interactive trust gate that codex-fleet handles).
command = "codex-fleet exec --skip-git-repo-check --dangerously-bypass-approvals-and-sandbox -m gpt-5.5 -c model_reasoning_effort=xhigh {prompt}"
output = "text"
answer_path = ""
use_stdin = true

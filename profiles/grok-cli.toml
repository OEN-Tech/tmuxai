[meta]
name = "grok-cli"
cli_command = "grok"
banner = 'Grok Build Beta\s+[\d.]+'
version_capture = '([\d.]+)'
# --no-alt-screen keeps scrollback so capture-pane -S works; --always-approve =
# YOLO; --no-memory keeps each spawn isolated. The first-run directory-picker
# gate is disabled once globally via `hints.project_picker_disabled=true` in
# ~/.grok/config.toml (the daemon can't dismiss an interactive gate).
launch_command = "grok -m grok-build --no-alt-screen --always-approve --no-memory --effort xhigh"

[prompt]
# Idle input box: "  ‚îÇ ‚ùØ                         ‚îÇ"  (‚ùØ then spaces then border).
pattern = '^\s*‚îÇ ‚ùØ\s+‚îÇ\s*$'
# Echoed user turn in the transcript: "  ‚ùØ <text>          9:44 PM"  (no border).
input = '^\s*‚ùØ (\S.*)'
submit_keys = ["Enter"]

[separator]
pattern = '^[‚îÄ‚îÅ]{20,}'

[markers]
# Grok answers have NO leading glyph ‚Äî bare text between "‚óÜ Thought for ‚Ä¶" and
# "Turn completed in ‚Ä¶". text_after_thinking makes the first plain line after a
# thinking marker start the response; response_end bounds it.
assistant_prefix = ""
tool_use = '^\s*‚óè\s+(Ran|Read|Wrote|Edited|Searched)\s+(.+)'
tool_result = ''
truncated = ''
thinking = '^\s*‚óÜ Thought for (.+)'
skill_load = ''
response_end = '^\s*Turn completed in '
text_after_thinking = true

[tasks]
done = "‚úì"
active = ""
pending = ""

[status_bar]
# Top bar shows cwd + context tokens: "  /private/tmp   ‚îÇ 30K / 512K ‚îÇ"
pattern = '‚îÇ\s*(\d+K) / (\d+K)\s*‚îÇ'
peak_indicator = ''
memory = ''

[question]
choice_pattern = '^\s*([A-Z])\)\s+(.+)'

[error]
patterns = [
    '^\s*Error:',
    '^\s*‚úó',
]

[chrome]
# Welcome box, tips, footers, menu, and the bare "Beta" tag ‚Äî must never appear
# in assistant text. (assistant_prefix is empty, so these would otherwise be
# Unrecognized; checked last in the classifier, they can only swallow leftovers.)
patterns = [
    '^\s*[‚ï≠‚ï∞‚îÇ‚îÉ]',
    '^\s*Tip: ',
    '^\s*Shift\+Tab:',
    '^\s*Ctrl\+',
    '^\s*Esc:',
    '^\s*(New worktree|Resume session|Changelog|Quit)\b',
    'Composer 2\.5 is here',
    '^\s*Beta\s*$',
]
# NOTE: grok's right-margin scrollbar ‚ñà column is stripped in the classifier
# (strip_scrollbar), not here ‚Äî a chrome pattern drops the whole line, but the
# scrollbar overlays the right edge of TEXT rows too, so the text must be kept.

[exec]
# Headless single-turn.
command = "grok -m grok-build --effort xhigh -p {prompt} --output-format json"
output = "json"
# jq-style dot-path into the JSON response (verified: grok -p emits {"text": "..."}).
answer_path = ".text"
use_stdin = false

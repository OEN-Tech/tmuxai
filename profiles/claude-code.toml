[meta]
name = "claude-code"
cli_command = "claude"
banner = 'Claude Code v[\d.]+'
version_capture = 'v([\d.]+)'
launch_command = "claude --dangerously-skip-permissions"

[prompt]
pattern = '^вЭѓ\s*$'
input = '^вЭѓ (.+)'

[separator]
pattern = '^вФА{20,}'

[markers]
assistant_prefix = "вПЇ"
tool_use = '^вПЇ (\w+)\((.+)\)$'
tool_result = '^\s+вОњ\s+(.+)'
truncated = '^\s+вА¶ \+(\d+) lines'
thinking = '^[вЬївЬґвЬљвЬЈ] (.+?)(?:\s+\((.+?)\))?$'
skill_load = '^вПЇ Skill\(([^)]+)\)'

[tasks]
done = "вЬФ"
active = "вЧЉ"
pending = "вЧї"

[status_bar]
pattern = '^\s+(.+?)\s+[вЖУвђЗ](\S+)\s+[вЖСвђЖ](\S+)\s+\$(\S+)\s+\[([вЦИвЦС]+)\]\s+(\d+)%'
peak_indicator = 'Off-Peak|Peak'
memory = 'MEM:(\d+)%'

[question]
choice_pattern = '^\s*-?\s*\*?\*?([A-Z])\)?\*?\*?\s+(.+)'

[error]
patterns = [
    '^Error:',
    '^вЬЧ',
    'ENOENT|EPERM|EACCES',
    'panic|stack trace|Traceback',
]
